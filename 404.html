<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ARKHEA</title>
    <script>
        // Redirigir a index.html manteniendo la ruta en el hash
        var segment = window.location.pathname.split('/').pop();
        if (segment && !segment.includes('.')) {
            window.location.replace('/arkhea/#' + window.location.pathname);
        } else {
            window.location.replace('/arkhea/');
        }
    </script>
</head>
<body>
</body>
</html>
