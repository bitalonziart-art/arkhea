<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ARKHEA</title>
    <script type="text/javascript">
      // Redirigir 404s a index.html para Single Page Apps
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/arkhea/' + l.pathname.slice(1).split('/').slice(-pathSegmentsToKeep).join('/') +
        (l.search ? l.search : '') +
        '#' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
      );
    </script>
  </head>
  <body>
  </body>
</html>
